# ============================================================
# Cloudflare Tunnel Configuration
#
# Prerequisites:
#   1. Install cloudflared: https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/downloads/
#   2. Authenticate:  cloudflared tunnel login
#   3. Create tunnel: cloudflared tunnel create nexustrader
#   4. Configure DNS: cloudflared tunnel route dns nexustrader <your-domain>
#   5. Copy credentials file to this directory
#
# Usage:
#   cloudflared tunnel --config infra/cloudflared/config.yml run nexustrader
# ============================================================

# Tunnel name (matches `cloudflared tunnel create <name>`)
tunnel: nexustrader

# Credentials file generated by `cloudflared tunnel create`
# IMPORTANT: Do NOT commit this file to version control
credentials-file: /etc/cloudflared/credentials.json

ingress:
  # Frontend (React app via Vite preview or nginx)
  - hostname: nexustrader.yourdomain.com
    service: http://localhost:3000
    originRequest:
      noTLSVerify: false

  # API backend (FastAPI)
  - hostname: api.nexustrader.yourdomain.com
    service: http://localhost:8000
    originRequest:
      noTLSVerify: false

  # WebSocket (same backend, different path)
  - hostname: api.nexustrader.yourdomain.com
    path: /ws
    service: http://localhost:8000
    originRequest:
      noTLSVerify: false

  # Catch-all (required by cloudflared)
  - service: http_status:404
