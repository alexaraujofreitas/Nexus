# ============================================================
# NexusTrader Web Backend — Pytest Configuration
#
# Test Taxonomy:
#   unit                 Pure logic tests, no external services (default)
#   sandbox_integration  Requires in-process fakes (fakeredis) — runs anywhere
#   docker_integration   Requires live infrastructure (PostgreSQL, Redis)
#                        Only passes inside Docker E2E stack or with local DB
#
# Usage:
#   pytest tests/                          # Run all (docker_integration auto-skips without DB)
#   pytest tests/ -m "not docker_integration"   # Unit + sandbox only (guaranteed green)
#   pytest tests/ -m docker_integration    # Docker integration only (requires live DB)
# ============================================================
[pytest]
markers =
    unit: Pure unit tests — no external dependencies
    sandbox_integration: Tests using in-process fakes (fakeredis) — no live services required
    docker_integration: Tests requiring live infrastructure (PostgreSQL on port 5433, Redis) — only runs inside Docker E2E stack or with local database
asyncio_mode = auto
