# ============================================================
# NexusTrader E2E Test CI Pipeline
#
# Phase 6E hardened:
#   - Docker layer caching via buildx
#   - Playwright retries (2 retries in CI)
#   - Docker logs collected on failure
#   - Service healthcheck with proper timeout
# ============================================================
name: E2E Tests

on:
  push:
    branches:
      - main
      - 'web-*'
    paths:
      - 'web/**'
  pull_request:
    paths:
      - 'web/**'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Phase 6E: Docker layer caching
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('web/**/Dockerfile', 'web/**/package-lock.json', 'web/**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and start E2E stack
        run: |
          docker compose -f web/docker-compose.e2e.yml build \
            --build-arg BUILDKIT_INLINE_CACHE=1
          docker compose -f web/docker-compose.e2e.yml up -d
          echo "Waiting for services to be healthy..."
          # Wait up to 60s for API health
          for i in $(seq 1 12); do
            if docker compose -f web/docker-compose.e2e.yml exec -T api curl -sf http://localhost:8000/health; then
              echo "API is healthy"
              break
            fi
            echo "Waiting for API... ($i/12)"
            sleep 5
          done

      # Phase 6E: Playwright with retries
      - name: Run Playwright tests
        run: |
          docker compose -f web/docker-compose.e2e.yml run --rm playwright \
            npx playwright test --reporter=list,html --retries=2 --workers=2

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14

      - name: Upload test results (screenshots + traces)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: web/test-results/
          retention-days: 14

      # Phase 6E: Collect Docker logs on failure for debugging
      - name: Collect Docker logs
        if: failure()
        run: |
          mkdir -p web/docker-logs
          docker compose -f web/docker-compose.e2e.yml logs api > web/docker-logs/api.log 2>&1
          docker compose -f web/docker-compose.e2e.yml logs frontend > web/docker-logs/frontend.log 2>&1
          docker compose -f web/docker-compose.e2e.yml logs postgres > web/docker-logs/postgres.log 2>&1
          docker compose -f web/docker-compose.e2e.yml logs redis > web/docker-logs/redis.log 2>&1

      - name: Upload Docker logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: docker-logs
          path: web/docker-logs/
          retention-days: 7

      - name: Stop E2E stack
        if: always()
        run: |
          docker compose -f web/docker-compose.e2e.yml down -v
