# ============================================================
# NEXUS TRADER Web — Docker Compose
#
# Services:
#   - postgres: PostgreSQL 16 database
#   - redis: Redis 7 for pub/sub + caching
#   - api: FastAPI backend (port 8000)
#   - engine: Headless Trading Engine
#
# Usage:
#   docker compose up -d
#   docker compose logs -f api engine
# ============================================================
version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
      POSTGRES_DB: ${POSTGRES_DB:-nexustrader}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - nexus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexustrader}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-net

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - nexus_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-net

  # ── API Service (FastAPI) ─────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NEXUS_DATABASE_URL: postgresql://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus}@postgres:5432/${POSTGRES_DB:-nexustrader}
      NEXUS_REDIS_URL: redis://redis:6379/0
      NEXUS_JWT_SECRET: ${NEXUS_JWT_SECRET:-CHANGE-ME-IN-PRODUCTION-32chars!}
      NEXUS_DEBUG: ${NEXUS_DEBUG:-true}
      NEXUS_CORS_ORIGINS: ${NEXUS_CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      NEXUS_SERVICE_NAME: api
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Mount NexusTrader project root for core/ access
      - ..:/app/nexustrader:ro
    networks:
      - nexus-net

  # ── Trading Engine Service ────────────────────────────────
  engine:
    build:
      context: .
      dockerfile: engine/Dockerfile
    container_name: nexus-engine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NEXUS_DATABASE_URL: postgresql://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus}@postgres:5432/${POSTGRES_DB:-nexustrader}
      NEXUS_REDIS_URL: redis://redis:6379/0
      NEXUS_CONFIG_PATH: /app/nexustrader/config.yaml
      NEXUS_ROOT_DIR: /app/nexustrader
      NEXUS_SERVICE_NAME: engine
    volumes:
      # Mount NexusTrader project root for core/, config/, data/ access
      - ..:/app/nexustrader
    networks:
      - nexus-net

volumes:
  nexus_pgdata:
    driver: local
  nexus_redis:
    driver: local

networks:
  nexus-net:
    driver: bridge
